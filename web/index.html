<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="notes_gema">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>notes_gema</title>

</head>
<body>
  <script type="module">
    import { FilesetResolver, LlmInference } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai@0.10.16';
    window.FilesetResolver = FilesetResolver;
    window.LlmInference = LlmInference;

    // FORCE VERSION INTERCEPTOR (0.10.16): 
    const originalForGenAiTasks = window.FilesetResolver.forGenAiTasks;
    window.FilesetResolver.forGenAiTasks = async function(workerPath) {
      console.log("[SYSTEM] Forcing GenAI Task Resolver to version 0.10.16...");
      return await originalForGenAiTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai@0.10.16/wasm");
    };

    // LLM INFERENCE INTERCEPTOR: Force CPU if needed
    const originalCreateFromOptions = window.LlmInference.createFromOptions;
    window.LlmInference.createFromOptions = function(fileset, options) {
      console.log("[SYSTEM] MediaPipe: createFromOptions called.", options);
      if (window._FORCE_CPU) {
        console.log("[SYSTEM] MediaPipe Override: Detected _FORCE_CPU = true. Force-setting device to CPU.");
        if (!options.deviceOptions) options.deviceOptions = {};
        options.deviceOptions.device = 'CPU';
      }
      return originalCreateFromOptions.call(window.LlmInference, fileset, options);
    };

    const originalCreateFromModelPath = window.LlmInference.createFromModelPath;
    window.LlmInference.createFromModelPath = function(fileset, modelPath) {
       console.log("[SYSTEM] MediaPipe: createFromModelPath called for " + modelPath);
       if (window._FORCE_CPU) {
          console.log("[SYSTEM] Re-routing createFromModelPath to createFromOptions to force CPU.");
          return window.LlmInference.createFromOptions(fileset, {
             baseOptions: { modelAssetPath: modelPath },
             deviceOptions: { device: 'CPU' }
          });
       }
       return originalCreateFromModelPath.call(window.LlmInference, fileset, modelPath);
    };

    // Helper to clear the local OPFS storage if the model is corrupted or mismatched
    window.clearModelCache = async function() {
      try {
        if (navigator.storage && navigator.storage.getDirectory) {
           const root = await navigator.storage.getDirectory();
           // The flutter_gemma plugin stores models at the root of OPFS
           await root.removeEntry('gemma-4-E2B-it.litertlm');
           console.log("[SYSTEM] OPFS model cache cleared successfully.");
           return true;
        }
      } catch (e) {
        console.log("[SYSTEM] OPFS clear skipped (file not found or not supported).");
      }
      return false;
    };
    
    // Proactive safety and proactive CPU forcing
    window._FORCE_CPU = false;
    
    // Check persistent user preference (set from Control Panel)
    if (localStorage.getItem('NOTES_GEMA_GPU_ENABLED') === 'false') {
       window._FORCE_CPU = true;
       console.log("[SYSTEM] User preference: WebGPU manually disabled.");
    }

    if (navigator.gpu) {
      console.log("[SYSTEM] Shimming navigator.gpu...");
      const originalRequestAdapter = navigator.gpu.requestAdapter.bind(navigator.gpu);
      
      const createAdapterStub = (reason) => {
        console.log(`[SYSTEM] Creating adapter stub (Reason: ${reason})`);
        
        const safeLimits = {
          maxBufferSize: 1024 * 1024 * 1024,
          maxStorageBufferBindingSize: 1024 * 1024 * 1024,
          maxComputeWorkgroupStorageSize: 32768,
          maxComputeInvocationsPerWorkgroup: 256,
        };

        const safeFeatures = {
          has: () => false,
          keys: () => ({ [Symbol.iterator]: function*(){} }),
          entries: () => ({ [Symbol.iterator]: function*(){} }),
          forEach: () => {}
        };

        const info = { device: "none", architecture: "none", vendor: "none", description: reason, isStub: true };
        
        const stub = {
          requestAdapterInfo: async () => info,
          requestDevice: async () => null, 
          features: safeFeatures,
          limits: safeLimits,
          adapterInfo: info,
          isStub: true
        };
        
        return new Proxy(stub, {
          get(target, prop) {
            return target[prop];
          },
          set(target, prop, value) {
            console.log(`[SYSTEM] Adapter Stub intercepting SET: ${String(prop)}`);
            target[prop] = value;
            return true;
          }
        });
      };

      navigator.gpu.requestAdapter = async function(options) {
        if (window._FORCE_CPU) {
          return createAdapterStub("force-cpu-stub");
        }

        try {
          const adapter = await originalRequestAdapter(options);
          
          if (!adapter) {
            console.warn("[SYSTEM] WebGPU original adapter is null. Providing a safety stub.");
            return createAdapterStub("safety-stub");
          }
          
          // Proactive limit check
          if (adapter.limits && adapter.limits.maxBufferSize < 524550144) {
             console.warn("[SYSTEM] Proactive limit check: maxBufferSize too low. Requesting CPU fallback.");
             window._FORCE_CPU = true;
             return createAdapterStub("limit-fallback-stub");
          }

          // Return a proxy of the real adapter so we can safely add properties like adapterInfo if needed
          const shadowProps = {};
          return new Proxy(adapter, {
            get(target, prop) {
              if (prop in shadowProps) return shadowProps[prop];
              
              const val = target[prop];
              if (typeof val === 'function') return val.bind(target);
              
              // Polyfill requestAdapterInfo if missing
              if (prop === 'requestAdapterInfo' && !target[prop]) {
                return async () => ({ device: "unknown", architecture: "unknown", vendor: "unknown", description: "shim" });
              }
              return val;
            },
            set(target, prop, value) {
              try {
                target[prop] = value;
              } catch (e) {
                console.warn(`[SYSTEM] Failed to set ${String(prop)} on real adapter, using shadow storage.`);
                shadowProps[prop] = value;
              }
              return true;
            }
          });
        } catch (e) {
          console.warn("[SYSTEM] navigator.gpu.requestAdapter threw an error:", e);
          return createAdapterStub("error-safety-stub");
        }
      };
    }

    // Add a helper to check for WebGPU support
    window.isWebGPUSupported = async function() {
      console.log("[SYSTEM] Probing GPU capabilities...");
      
      if (!navigator.gpu) {
        return { supported: false, reason: "navigator.gpu undefined" };
      }
      
      if (window._FORCE_CPU) return { supported: false, reason: "Manual CPU force active" };

      try {
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter || window._FORCE_CPU) {
          return { supported: false, reason: "Adapter request failed" };
        }

        let info = { vendor: "unknown", architecture: "unknown", device: "unknown", description: "unknown" };
        try { info = await adapter.requestAdapterInfo(); } catch (e) {
          // Fallback if requestAdapterInfo fails but we have a shimmed info
          if (adapter.adapterInfo) info = adapter.adapterInfo;
        }

        if (info.description.includes("stub") || info.description.toLowerCase().includes("swiftshader")) {
          return { supported: false, reason: "Software rendering or fallback stub detected", info: info };
        }

        console.log("[SYSTEM] WebGPU Validation Successful!");
        return { supported: true, info: info };
      } catch (e) {
        console.error("[SYSTEM] WebGPU probe failed with error:", e);
        return { supported: false, reason: e.toString() };
      }
    };

    // New helper to check if the model exists locally without crashing Dart/Dio
    window.checkFileExists = async function(url) {
      console.log("[SYSTEM] Checking local file:", url);
      try {
        // Try HEAD first (fastest)
        let response = await fetch(url, { method: 'HEAD' });
        if (response.ok) {
          const contentType = response.headers.get('content-type');
          if (contentType && contentType.includes('text/html')) {
             console.log("[SYSTEM] False positive detected: received HTML instead of model.");
             return false;
          }
          return true;
        }
        
        // If HEAD is blocked or not allowed, try a small GET range
        response = await fetch(url, { 
          method: 'GET', 
          headers: { 'Range': 'bytes=0-0' } 
        });
        
        if (response.ok || response.status === 206) {
          const contentType = response.headers.get('content-type');
          if (contentType && contentType.includes('text/html')) {
             console.log("[SYSTEM] False positive detected (range): received HTML instead of model.");
             return false;
          }
          return true;
        }
        return false;
      } catch (e) {
        console.log("[SYSTEM] File check failed for " + url + ":", e);
        return false;
      }
    };
  </script>
  <script src="./cache_api.js"></script>
  <script src="./opfs_helper.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
